<html lang="en">
<head>

     crossorigin="anonymous"></script>  
<title>2048 PRO MAX</title>
<style>
:root{
  --anim-mult: 1;
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 22px;
}

/* ---- DARK (default shell theme — graphite + brass, instrument-panel feel) ---- */
[data-theme="dark"]{
  --bg:#12151a; --bg-2:#0d0f13;
  --surface:#1b2027; --surface-2:#232933; --surface-border:#2a313c;
  --text-primary:#eef1f5; --text-secondary:#8b96a5; --text-faint:#5b6472;
  --accent:#e8a33d; --accent-soft:#f0c274; --text-on-accent:#1a1204;
  --accent-2:#5fb8b0;
  --success:#5fb88a; --danger:#e35d5d;
  --board-bg:#232933; --cell-empty:#2a313c;
  --shadow:0 10px 30px rgba(0,0,0,.45);
}
/* ---- CLASSIC (authentic original 2048 homage) ---- */
[data-theme="classic"]{
  --bg:#faf8ef; --bg-2:#f2eee2;
  --surface:#fff; --surface-2:#eee4da; --surface-border:#d9cfc1;
  --text-primary:#4a443c; --text-secondary:#877f72; --text-faint:#b6ada0;
  --accent:#8f7a66; --accent-soft:#a9967f; --text-on-accent:#fff;
  --accent-2:#f2b179;
  --success:#6a9e6a; --danger:#c15a5a;
  --board-bg:#bbada0; --cell-empty:rgba(238,228,218,.55);
  --shadow:0 10px 24px rgba(150,130,100,.25);
}
/* ---- LIGHT ---- */
[data-theme="light"]{
  --bg:#f5f7fa; --bg-2:#eceff3;
  --surface:#ffffff; --surface-2:#eef1f5; --surface-border:#dde2e8;
  --text-primary:#232933; --text-secondary:#6b7480; --text-faint:#a4acb6;
  --accent:#4d72a0; --accent-soft:#7597bd; --text-on-accent:#fff;
  --accent-2:#e8a33d;
  --success:#4a9d78; --danger:#d1544f;
  --board-bg:#dde2e8; --cell-empty:#eef1f5;
  --shadow:0 8px 24px rgba(80,100,130,.15);
}
/* ---- NEON ---- */
[data-theme="neon"]{
  --bg:#0a0a10; --bg-2:#05050a;
  --surface:#12121c; --surface-2:#1a1a28; --surface-border:#2a2a40;
  --text-primary:#f0f0ff; --text-secondary:#8888b0; --text-faint:#55557a;
  --accent:#00e5ff; --accent-soft:#6ef2ff; --text-on-accent:#001217;
  --accent-2:#ff2ec4;
  --success:#39e991; --danger:#ff3d6e;
  --board-bg:#1a1a28; --cell-empty:#20202f;
  --shadow:0 0 30px rgba(0,229,255,.15);
}
/* ---- GOLD ---- */
[data-theme="gold"]{
  --bg:#0d0b08; --bg-2:#080604;
  --surface:#171310; --surface-2:#211b14; --surface-border:#3a301f;
  --text-primary:#f6ecd4; --text-secondary:#a89572; --text-faint:#6b5d43;
  --accent:#d4af37; --accent-soft:#f5cf5b; --text-on-accent:#1a1204;
  --accent-2:#e8794a;
  --success:#7fbf6a; --danger:#e0645a;
  --board-bg:#211b14; --cell-empty:#2a2318;
  --shadow:0 10px 30px rgba(212,175,55,.15);
}
/* ---- OCEAN ---- */
[data-theme="ocean"]{
  --bg:#0b2438; --bg-2:#081a29;
  --surface:#0f3350; --surface-2:#134063; --surface-border:#1c5680;
  --text-primary:#e9f6fb; --text-secondary:#8fb9cf; --text-faint:#5c7f93;
  --accent:#2dd4bf; --accent-soft:#6fe9da; --text-on-accent:#012620;
  --accent-2:#4d9de0;
  --success:#3ecf8e; --danger:#e2685f;
  --board-bg:#134063; --cell-empty:#175076;
  --shadow:0 10px 30px rgba(0,10,20,.4);
}
/* ---- FOREST ---- */
[data-theme="forest"]{
  --bg:#161f12; --bg-2:#10160d;
  --surface:#1e2b18; --surface-2:#263521; --surface-border:#38492f;
  --text-primary:#eef3e6; --text-secondary:#a3b596; --text-faint:#697d5e;
  --accent:#8fbc5a; --accent-soft:#b0d67e; --text-on-accent:#101a08;
  --accent-2:#d9a441;
  --success:#7fd18a; --danger:#d9695a;
  --board-bg:#263521; --cell-empty:#2c3e26;
  --shadow:0 10px 28px rgba(0,10,0,.35);
}
/* ---- CYBERPUNK ---- */
[data-theme="cyberpunk"]{
  --bg:#130a1f; --bg-2:#0d0616;
  --surface:#1d1030; --surface-2:#271640; --surface-border:#3d2359;
  --text-primary:#f3e9ff; --text-secondary:#b399d4; --text-faint:#725a8f;
  --accent:#ff2ec4; --accent-soft:#ff7ddd; --text-on-accent:#1a0313;
  --accent-2:#00e5ff;
  --success:#3be991; --danger:#ff3d6e;
  --board-bg:#271640; --cell-empty:#2f1c4d;
  --shadow:0 0 34px rgba(255,46,196,.18);
}
*,*::before,*::after{box-sizing:border-box;}

/* ---------- icon badges (gradient, glossy, shadowed — the emoji replacement) ---------- */
.ibadge{
  display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; position:relative;
  border-radius:27%; color:#fff; overflow:hidden;
}
.ibadge::after{
  content:''; position:absolute; inset:0; pointer-events:none;
  background:linear-gradient(160deg, rgba(255,255,255,.4), rgba(255,255,255,0) 55%);
}
.ibadge svg{ position:relative; z-index:1; filter:drop-shadow(0 1px 1px rgba(0,0,0,.22)); }
.ibadge-sm{ width:30px; height:30px; box-shadow:0 4px 9px -3px var(--ibs,rgba(0,0,0,.4)), inset 0 1px 1px rgba(255,255,255,.3); }
.ibadge-sm svg{ width:16px; height:16px; }
.ibadge-md{ width:44px; height:44px; box-shadow:0 6px 14px -4px var(--ibs,rgba(0,0,0,.4)), inset 0 1px 1px rgba(255,255,255,.3); }
.ibadge-md svg{ width:23px; height:23px; }
.ibadge-lg{ width:72px; height:72px; border-radius:24%; box-shadow:0 10px 24px -6px var(--ibs,rgba(0,0,0,.4)), inset 0 2px 2px rgba(255,255,255,.3); }
.ibadge-lg svg{ width:36px; height:36px; }
.ibadge-amber{ background:linear-gradient(150deg,#f3c876,#e2952f); --ibs:rgba(226,149,47,.5); }
.ibadge-red{ background:linear-gradient(150deg,#ff9a8e,#e5484d); --ibs:rgba(229,72,77,.5); }
.ibadge-gold{ background:linear-gradient(150deg,#ffe28f,#e8ab2e); --ibs:rgba(232,171,46,.5); }
.ibadge-blue{ background:linear-gradient(150deg,#8fd8ff,#3b82f6); --ibs:rgba(59,130,246,.45); }
.ibadge-teal{ background:linear-gradient(150deg,#72ecd9,#0fa89a); --ibs:rgba(15,168,154,.45); }
.ibadge-purple{ background:linear-gradient(150deg,#cdbcfe,#8b5cf6); --ibs:rgba(139,92,246,.45); }
.ibadge-green{ background:linear-gradient(150deg,#9bf3b4,#22c55e); --ibs:rgba(34,197,94,.45); }
.ibadge-slate{ background:linear-gradient(150deg,#9aa7ba,#5b6577); --ibs:rgba(80,90,105,.45); }
.ibadge-pink{ background:linear-gradient(150deg,#ffb0d8,#ec4899); --ibs:rgba(236,72,153,.45); }
.iflat{ display:inline-flex; color:currentColor; }
.iflat svg{ display:block; }
.banner-ad-wrap{ margin-top:16px; border-radius:var(--radius-md); overflow:hidden; min-height:50px; }
.banner-ad-placeholder{
  display:flex; align-items:center; gap:10px; justify-content:center; text-align:center;
  background:var(--surface-2); border:1px dashed var(--surface-border); color:var(--text-faint);
  font-size:.68rem; padding:14px 16px; line-height:1.4;
}
.ad-sim-tag{
  display:inline-block; margin:0 auto 10px; padding:3px 10px; border-radius:99px; background:var(--surface-2);
  color:var(--text-faint); font-size:.6rem; font-weight:800; letter-spacing:.08em;
}
.ad-daily-count{ margin-top:8px; font-size:.7rem; color:var(--text-secondary); }
html,body{height:100%;}
body{
  margin:0; background:var(--bg); color:var(--text-primary);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  -webkit-font-smoothing:antialiased; overscroll-behavior:none; user-select:none;
  transition:background .4s ease, color .4s ease;
  min-height:100vh;
}
button{font-family:inherit; color:inherit;}
.num{ font-variant-numeric:tabular-nums; font-feature-settings:"tnum"; letter-spacing:.02em; }
.mono-label{ font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; text-transform:uppercase; letter-spacing:.14em; font-size:.68rem; color:var(--text-secondary); font-weight:600;}
#app{ min-height:100vh; padding-bottom:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.screen{ max-width:560px; margin:0 auto; padding:24px 18px; width:100%; display:flex; flex-direction:column; animation:screenIn .35s ease both; }
@keyframes screenIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

/* ---------- generic components ---------- */
.row{ display:flex; align-items:center; }
.between{ justify-content:space-between; }
.wrap-header{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.icon-btn{
  width:40px; height:40px; border-radius:50%; border:1px solid var(--surface-border);
  background:var(--surface); display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:1.1rem; color:var(--text-primary); flex-shrink:0;
  transition:transform .15s ease, background .2s ease;
}
.icon-btn:active{ transform:scale(.9); }
.page-title{ font-size:1.3rem; font-weight:800; letter-spacing:-.01em; margin:0;}
.card{
  background:var(--surface); border:1px solid var(--surface-border); border-radius:var(--radius-lg);
  padding:20px; box-shadow:0 8px 24px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.1);
  backdrop-filter:blur(4px); transform:translateZ(0);
}
.btn{
  border:none; border-radius:var(--radius-md); padding:13px 18px; font-weight:700; font-size:.92rem;
  cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
  transition:transform .15s ease, filter .2s ease; letter-spacing:.01em;
}
.btn:active{ transform:scale(.97); }
.btn-primary{ background:var(--accent); color:var(--text-on-accent); }
.btn-primary:hover{ filter:brightness(1.08); }
.btn-secondary{ background:var(--surface-2); color:var(--text-primary); border:1px solid var(--surface-border); }
.btn-danger{ background:var(--danger); color:#fff; }
.btn-block{ width:100%; }
.btn-sm{ padding:9px 14px; font-size:.8rem; }
.pill{ padding:4px 10px; border-radius:999px; font-size:.68rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; }
.pill-locked{ background:var(--surface-2); color:var(--text-faint); }
.pill-soon{ background:var(--accent-2); color:var(--text-on-accent); }
.pill-new{ background:var(--success); color:#08170f; }
.divider{ height:1px; background:var(--surface-border); margin:14px 0; border:none; }
.progress-track{ height:8px; border-radius:99px; background:var(--surface-2); overflow:hidden; }
.progress-fill{ height:100%; background:var(--accent); border-radius:99px; transition:width .5s cubic-bezier(.22,.9,.3,1); }

/* ---------- bottom nav ---------- */
.bottom-nav{
  position:fixed; left:0; right:0; bottom:0; z-index:40; background:var(--surface);
  border-top:1px solid var(--surface-border); display:flex; padding:8px 4px calc(8px + env(safe-area-inset-bottom));
  max-width:560px; margin:0 auto;
}
@media (min-width:560px){ .bottom-nav{ left:50%; transform:translateX(-50%); border-radius:20px 20px 0 0; box-shadow:0 -6px 24px rgba(0,0,0,.2);} }
.nav-item{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 2px;
  background:none; border:none; cursor:pointer; color:var(--text-faint); font-size:1.15rem; border-radius:12px;
}
.nav-item .lbl{ font-size:.62rem; font-weight:700; letter-spacing:.03em; }
.nav-item.active{ color:var(--accent); }

/* ---------- splash ---------- */
.splash-screen{
  position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:radial-gradient(ellipse at 50% 30%, var(--surface-2), var(--bg) 70%); z-index:100; gap:18px;
}
.splash-logo{
  width:104px; height:104px; display:flex; align-items:center; justify-content:center;
  filter:drop-shadow(0 18px 40px rgba(226,149,47,.45)); animation:splashScale .7s cubic-bezier(.2,1.4,.4,1) both;
}
.splash-logo svg{ display:block; }
@keyframes splashScale{ 0%{opacity:0; transform:scale(.5) rotate(-8deg);} 100%{opacity:1; transform:scale(1) rotate(0);} }
.splash-title{ font-size:1.5rem; font-weight:900; letter-spacing:.02em; opacity:0; animation:splashFade .6s ease .35s forwards; }
.splash-sub{ font-size:.78rem; color:var(--text-secondary); letter-spacing:.2em; text-transform:uppercase; opacity:0; animation:splashFade .6s ease .55s forwards; }
@keyframes splashFade{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

/* ---------- home dashboard ---------- */
.hero-row{ display:flex; align-items:center; gap:12px; margin-bottom:18px; }
.wordmark{
  font-size:2.4rem; font-weight:900; letter-spacing:-.03em; line-height:1;
  color:#f3c876;
  text-shadow:
    0 1px 0 #e8a33d,
    0 2px 0 #d4922a,
    0 3px 0 #b87c1f,
    0 4px 0 #9c6a16,
    0 6px 16px rgba(0,0,0,.5),
    0 2px 40px rgba(243,200,118,.3);
  display:block;
}
.wordmark span{ color:#fff; font-weight:900; }
.wordmark span{ color:var(--accent); }
.title-badge{
  margin-left:auto; display:flex; align-items:center; gap:6px; background:var(--surface); border:1px solid var(--surface-border);
  padding:6px 10px 6px 6px; border-radius:99px; cursor:pointer;
}
.title-badge .lvl-chip{ width:26px; height:26px; border-radius:50%; background:var(--accent); color:var(--text-on-accent); font-weight:800; font-size:.72rem; display:flex; align-items:center; justify-content:center; }
.dash-card{ margin-bottom:14px; }
.dash-xp-row{ display:flex; justify-content:space-between; font-size:.78rem; color:var(--text-secondary); margin-bottom:6px;}
.dash-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
.dash-stat{ background:var(--surface-2); border-radius:var(--radius-md); padding:10px 12px; }
.dash-stat .v{ font-size:1.15rem; font-weight:800; }
.dash-stat .k{ font-size:.68rem; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.06em; }
.menu-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:16px; }
.menu-tile{
  background:var(--surface); border:1px solid var(--surface-border); border-radius:var(--radius-md);
  padding:16px 14px; text-align:left; cursor:pointer; display:flex; flex-direction:column; gap:8px;
}
.menu-tile .ic{ font-size:1.4rem; }
.menu-tile .lbl{ font-weight:700; font-size:.9rem; }
.menu-tile .sub{ font-size:.72rem; color:var(--text-secondary); }
.menu-list{ display:flex; flex-direction:column; gap:10px; }
.menu-row{
  display:flex; align-items:center; gap:14px; width:100%; text-align:left;
  background:var(--surface); border:1px solid var(--surface-border); border-radius:var(--radius-lg);
  padding:16px 16px; cursor:pointer;
  box-shadow:0 8px 20px -5px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.08);
  transition:transform .15s ease, box-shadow .15s ease;
}
.menu-row:active{ transform:scale(.98); box-shadow:0 3px 8px -2px rgba(0,0,0,.25); }
.menu-row-body{ flex:1; min-width:0; }
.menu-row-lbl{ font-weight:700; font-size:.96rem; }
.menu-row-sub{ font-size:.73rem; color:var(--text-secondary); margin-top:2px; }
.menu-row-chev{ color:var(--text-faint); flex-shrink:0; }
.continue-card{ display:flex; align-items:center; gap:14px; cursor:pointer; }
.continue-board-mini{ width:52px; height:52px; border-radius:12px; background:var(--board-bg); flex-shrink:0; display:grid; grid-template-columns:repeat(4,1fr); gap:2px; padding:5px;}
.continue-board-mini div{ background:var(--accent-soft); border-radius:3px; opacity:.85;}

/* ---------- mode select ---------- */
.mode-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin:20px 0; }
/* Tester mode styles */
.tester-mode-bar{
  margin-top:6px; font-size:.65rem; font-weight:800; letter-spacing:.06em;
  color:#22c55e; text-transform:uppercase; animation:testerPulse 1.8s ease infinite;
}
.tester-hint{
  margin-top:6px; font-size:.6rem; color:var(--text-faint); letter-spacing:.04em;
}
@keyframes testerPulse{ 0%,100%{opacity:.7;} 50%{opacity:1;} }
.mode-card.tester-card{
  border-color:#22c55e;
  box-shadow:0 0 0 1.5px #22c55e44, 0 10px 28px -6px rgba(34,197,94,.35), inset 0 1px 0 rgba(255,255,255,.1);
}
.mode-card.tester-card .mode-size-badge{
  background:rgba(34,197,94,.18); color:#22c55e;
}
.tester-glow{
  position:absolute; inset:0; border-radius:inherit; pointer-events:none;
  background:linear-gradient(135deg, rgba(34,197,94,.08), transparent 60%);
}
.mode-card{
  border-radius:var(--radius-lg); padding:16px; border:1px solid var(--surface-border);
  background:var(--surface); cursor:pointer; position:relative; overflow:hidden;
  aspect-ratio:1/1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
  box-shadow:0 10px 28px -6px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.1);
  transition:transform .2s ease, box-shadow .2s ease;
}
.mode-card:hover:not(.locked){ transform:translateY(-4px); box-shadow:0 14px 36px -6px rgba(0,0,0,.4); }
.mode-card.locked{ opacity:.5; cursor:not-allowed; filter:grayscale(.5); }
.mode-card .mode-top{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; width:100%; }
.mode-size-badge{
  width:48px; height:48px; border-radius:12px; background:var(--surface-2); display:flex; align-items:center;
  justify-content:center; font-weight:900; font-size:.88rem; flex-shrink:0; color:var(--accent);
  box-shadow:0 4px 12px rgba(0,0,0,.2);
}
.mode-info{ flex:0; padding:0; }
.mode-info h3{ margin:2px 0 0; font-size:.92rem; }
.mode-info p{ margin:3px 0 0; font-size:.7rem; color:var(--text-secondary); line-height:1.2; }
.lock-ic{ font-size:1rem; color:var(--text-faint); }

/* ---------- game screen ---------- */
.game-topbar{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
.game-screen{ justify-content:flex-start; padding-top:18px; }
.xp-mini{ margin-bottom:10px; }
.mode-chip{ font-size:.7rem; font-weight:700; color:var(--text-secondary); background:var(--surface); border:1px solid var(--surface-border); padding:5px 10px; border-radius:99px; }
.score-row{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:8px; }
.score-block{
  background:var(--surface); border:1px solid var(--surface-border); border-radius:var(--radius-md);
  padding:12px 6px; text-align:center; position:relative;
  box-shadow:0 6px 18px -4px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.08);
}
.score-block .k{ font-size:.58rem; font-weight:800; letter-spacing:.08em; color:var(--text-faint); margin-bottom:3px; }
.score-block .v{ font-size:1.15rem; font-weight:900; }
.score-block .k{ font-size:.6rem; text-transform:uppercase; letter-spacing:.1em; color:var(--text-secondary); font-weight:700;}
.score-block .v{ font-size:1.25rem; font-weight:900; margin-top:1px; }
.score-pop{ position:absolute; top:-6px; right:6px; font-size:.7rem; font-weight:800; color:var(--success); animation:scorePop .9s ease forwards; pointer-events:none;}
@keyframes scorePop{ 0%{opacity:0; transform:translateY(0);} 20%{opacity:1;} 100%{opacity:0; transform:translateY(-22px);} }
.xp-mini{ grid-column:1/-1; margin-top:2px; }
.action-bar{ display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-bottom:14px; }
.action-btn-bonus{ border-color:var(--accent); }
.action-btn-bonus .iflat{ color:var(--accent); }
.action-btn{
  background:var(--surface); border:1px solid var(--surface-border); border-radius:var(--radius-md);
  padding:9px 2px; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; font-size:1.05rem;
  position:relative;
}
.action-btn .lbl{ font-size:.58rem; font-weight:700; color:var(--text-secondary); }
.action-btn:disabled{ opacity:.35; cursor:not-allowed; }
.action-btn .count{ position:absolute; top:2px; right:4px; font-size:.58rem; font-weight:800; color:var(--accent); }
.board-outer{ display:flex; justify-content:center; position:relative; }
.board{
  background:var(--board-bg); border-radius:var(--radius-lg); padding:8px; display:grid; gap:8px; width:100%;
  max-width:min(92vw,440px); aspect-ratio:1/1; position:relative; touch-action:none;
}
.cell-bg{ background:var(--cell-empty); border-radius:var(--radius-sm); }
.tile-layer{ position:absolute; inset:8px; }
.tile{
  position:absolute; display:flex; align-items:center; justify-content:center; border-radius:var(--radius-sm);
  font-weight:800; box-shadow:0 3px 8px rgba(0,0,0,.18);

function mergeDefaults(def, saved){
  function merge(a,b){
    if(Array.isArray(a)) return Array.isArray(b) ? b : a;
    if(a && typeof a==='object'){
      const out={...a};
      if(b && typeof b==='object') Object.keys(b).forEach(k=>{ out[k]=(k in a)?merge(a[k],b[k]):b[k]; });
      return out;
    }
    return b===undefined ? a : b;
  }
  return merge(def, saved||{});
}
let STATE=null;
let saveTimer=null;
function scheduleSave(){ clearTimeout(saveTimer); saveTimer=setTimeout(persist, 400); }
function persistNow(){
  if(!STATE) return;
  const json = JSON.stringify(STATE);
  try{ if(window.localStorage) window.localStorage.setItem(SAVE_KEY, json); }
  catch(e){ console.error('localStorage save failed', e); }
  try{ if(window.storage && window.storage.set) window.storage.set(SAVE_KEY, json, false); }
  catch(e){}
}
async function persist(){
  if(!STATE) return;
  persistNow();
  try{
    if(window.storage && window.storage.set) await window.storage.set(SAVE_KEY, JSON.stringify(STATE), false);
  }catch(e){}
}
async function loadState(){
  try{
    if(window.storage && window.storage.get){
      const res = await window.storage.get(SAVE_KEY, false);
      if(res && res.value) return mergeDefaults(defaultState(), JSON.parse(res.value));
    }
  }catch(e){ /* not available here -> fall through */ }
  try{
    if(window.localStorage){
      const raw = window.localStorage.getItem(SAVE_KEY);
      if(raw) return mergeDefaults(defaultState(), JSON.parse(raw));
    }
  }catch(e){ /* fall through to defaults */ }
  return defaultState();
}

let TILE_ID_SEQ=1;
function makeTile(value){ return {id:'t'+(TILE_ID_SEQ++), value}; }
function emptyGridTiles(size){ return Array.from({length:size},()=>Array(size).fill(null)); }
function gridToBoard(g){ return g.map(row=>row.map(t=>t?t.value:0)); }
function cloneGrid(g){ return g.map(row=>row.map(t=>t?{id:t.id,value:t.value}:null)); }
function countEmpty(board){ let c=0; board.forEach(row=>row.forEach(v=>{ if(v===0) c++; })); return c; }
function maxTileOf(board){ let m=0; board.forEach(row=>row.forEach(v=>{ if(v>m) m=v; })); return m; }
function hasEmptyCell(board){ return board.some(row=>row.some(v=>v===0)); }
function canMergeBoard(board){
  const n=board.length;
  for(let r=0;r<n;r++) for(let c=0;c<n;c++){
    const v=board[r][c];
    if(c+1<n && board[r][c+1]===v) return true;
    if(r+1<n && board[r+1][c]===v) return true;
  }
  return false;
}
function isGameOverBoard(board){ return !hasEmptyCell(board) && !canMergeBoard(board); }
function transposeGrid(g){ return g[0].map((_,c)=>g.map(row=>row[c])); }
function slideLineTiles(line){
  const tiles=line.filter(t=>t!==null);
  const out=[]; let i=0;
  while(i<tiles.length){
    if(i+1<tiles.length && tiles[i].value===tiles[i+1].value){ out.push({id:tiles[i].id,value:tiles[i].value*2,mergedFromId:tiles[i+1].id}); i+=2; }
    else { out.push({id:tiles[i].id,value:tiles[i].value}); i+=1; }
  }
  while(out.length<line.length) out.push(null);
  return out;
}
function applyMoveWithTracking(grid, direction){
  let working=grid.map(r=>r.slice());
  if(direction==='up') working=transposeGrid(working);
  else if(direction==='down') working=transposeGrid(working).map(r=>r.slice().reverse());
  else if(direction==='right') working=working.map(r=>r.slice().reverse());
  let scoreGained=0, merges=0, mergedValues=[];
  const newLines = working.map(line=>{
    const nl=slideLineTiles(line);
    nl.forEach(t=>{ if(t&&t.mergedFromId){ scoreGained+=t.value; merges++; mergedValues.push(t.value); } });
    return nl;
  });
  let result=newLines;
  if(direction==='up') result=transposeGrid(newLines);
  else if(direction==='down') result=transposeGrid(newLines.map(r=>r.slice().reverse()));
  else if(direction==='right') result=newLines.map(r=>r.slice().reverse());
  const changed = JSON.stringify(gridToBoard(grid)) !== JSON.stringify(gridToBoard(result));
  return {grid:result, changed, scoreGained, merges, mergedValues};
}
function spawnTileIntoGrid(grid){
  const empties=[]; grid.forEach((row,r)=>row.forEach((t,c)=>{ if(!t) empties.push([r,c]); }));
  if(!empties.length) return null;
  const [r,c]=empties[Math.floor(Math.random()*empties.length)];
  const tile=makeTile(Math.random()<0.9?2:4);
  grid[r][c]=tile;
  return {id:tile.id, value:tile.value, r, c};
}
function spawnTileForcedIntoGrid(grid, value){
  const empties=[]; grid.forEach((row,r)=>row.forEach((t,c)=>{ if(!t) empties.push([r,c]); }));
  if(!empties.length) return null;
  const [r,c]=empties[Math.floor(Math.random()*empties.length)];
  const tile=makeTile(value);
  grid[r][c]=tile;
  return {id:tile.id, value:tile.value, r, c};
}

// ============================== GAME SESSION ==============================
let ACTIVE_GAME=null;
let TICK_INTERVAL=null;
function startTicking(){
  stopTicking();
  TICK_INTERVAL=setInterval(()=>{
    if(CURRENT_SCREEN==='game' && ACTIVE_GAME && !ACTIVE_GAME.isOver){
      ACTIVE_GAME.elapsedSec++;
      STATE.stats.totalPlaytimeSec++;
      runAchievementChecks({event:'tick'});
      if(ACTIVE_GAME.elapsedSec % 8===0) scheduleSave();
    }
  },1000);
}
function stopTicking(){ if(TICK_INTERVAL){ clearInterval(TICK_INTERVAL); TICK_INTERVAL=null; } }

function newGameStateGrid(modeId){
  const mode=MODES.find(m=>m.id===modeId);
  const grid=emptyGridTiles(mode.size);
  spawnTileIntoGrid(grid); spawnTileIntoGrid(grid);
  return {
    mode:modeId, grid, score:0, prevSnapshot:null,
    undosLeft:1, shufflesLeft:1, hintsUsedThisGame:0,
    mergesThisGame:0, movesThisGame:0, minEmptyCellsSeen:Infinity,
    hasWon:false, isOver:false, finalized:false, elapsedSec:0, forcedNextSpawn:null,
  };
}
function serializeActiveGame(){ return ACTIVE_GAME ? JSON.parse(JSON.stringify(ACTIVE_GAME)) : null; }

function startGame(modeId){
  if(ACTIVE_GAME && !ACTIVE_GAME.finalized) finalizeSession(ACTIVE_GAME.hasWon);
  stopTicking();
  TILE_ID_SEQ=1; // reset counter for a fresh game
  ACTIVE_GAME=newGameStateGrid(modeId);
  syncTileIdSeq(ACTIVE_GAME.grid); // ensure IDs are consistent from the start
  STATE.stats.gamesPlayed++;
  STATE.stats.modeCounts[modeId]=(STATE.stats.modeCounts[modeId]||0)+1;
  STATE.stats.perMode[modeId].gamesPlayed++;
  updateStreak();
  updateDailyChallengeForNewGame();
  STATE.savedGame=serializeActiveGame();
  scheduleSave();
  nav('game');
  startTicking();
}
function syncTileIdSeq(grid){
  // After loading a saved game, scan every tile ID in the grid and push
  // TILE_ID_SEQ above the highest existing ID so new tiles never collide.
  let max=0;
  grid.forEach(row=>row.forEach(t=>{
    if(t && t.id){
      const n=parseInt(t.id.replace('t',''),10);
      if(!isNaN(n) && n>max) max=n;
    }
  }));
  if(max>=TILE_ID_SEQ) TILE_ID_SEQ=max+1;
}
function resumeGame(){
  if(STATE.savedGame && !STATE.savedGame.isOver){
    ACTIVE_GAME=STATE.savedGame;
    syncTileIdSeq(ACTIVE_GAME.grid);  // CRITICAL: prevent ID collision
    nav('game');
    startTicking();
  } else nav('modes');
}
function finalizeSession(won){
  if(!ACTIVE_GAME || ACTIVE_GAME.finalized) return;
  ACTIVE_GAME.finalized=true;
  const modeId=ACTIVE_GAME.mode, dur=ACTIVE_GAME.elapsedSec;
  if(dur>0){
    if(dur>STATE.stats.longestSessionSec) STATE.stats.longestSessionSec=dur;
    if(STATE.stats.shortestSessionSec===null || dur<STATE.stats.shortestSessionSec) STATE.stats.shortestSessionSec=dur;
  }
  STATE.stats.totalScoreSum += ACTIVE_GAME.score;
  if(won){ STATE.stats.gamesWon++; STATE.stats.perMode[modeId].gamesWon++; }
  const board=gridToBoard(ACTIVE_GAME.grid);
  const mx=maxTileOf(board);
  if(mx>STATE.stats.perMode[modeId].highestTile) STATE.stats.perMode[modeId].highestTile=mx;
  if(ACTIVE_GAME.score>STATE.stats.perMode[modeId].highScore) STATE.stats.perMode[modeId].highScore=ACTIVE_GAME.score;
}

function doMove(direction){
  if(!ACTIVE_GAME || ACTIVE_GAME.isOver) return;
  if(document.getElementById('active-modal')) return;
  const {grid:newGrid, changed, scoreGained, merges, mergedValues} = applyMoveWithTracking(ACTIVE_GAME.grid, direction);
  if(!changed) return;

  ACTIVE_GAME.prevSnapshot = { grid: cloneGrid(ACTIVE_GAME.grid), score: ACTIVE_GAME.score };
  ACTIVE_GAME.grid = newGrid;
  ACTIVE_GAME.score += scoreGained;
  ACTIVE_GAME.movesThisGame++;
  ACTIVE_GAME.mergesThisGame += merges;
  STATE.stats.totalMoves++;
  STATE.stats.totalMerges += merges;

  let xpGain=0; mergedValues.forEach(v=>{ xpGain+=xpForMerge(v); });
  let leveled=false;
  if(xpGain>0) leveled=applyXP(xpGain);
  if(leveled) queueToast('Level Up! Now Level '+STATE.profile.level+' — '+STATE.profile.title);

  playSound('swipe');
  if(merges>0) playSound('merge');

  const forced=ACTIVE_GAME.forcedNextSpawn;
  let spawnedPos = forced ? spawnTileForcedIntoGrid(ACTIVE_GAME.grid, forced) : spawnTileIntoGrid(ACTIVE_GAME.grid);
  if(forced) ACTIVE_GAME.forcedNextSpawn=null;

  const afterBoard=gridToBoard(ACTIVE_GAME.grid);
  const empties=countEmpty(afterBoard);
  if(empties<ACTIVE_GAME.minEmptyCellsSeen) ACTIVE_GAME.minEmptyCellsSeen=empties;

  const newMax=maxTileOf(afterBoard);
  if(newMax>STATE.stats.highestTile) STATE.stats.highestTile=newMax;
  if(ACTIVE_GAME.score>STATE.stats.highestScore) STATE.stats.highestScore=ACTIVE_GAME.score;

  updateChallengeProgress({merges, maxTile:newMax, score:ACTIVE_GAME.score});
  animateMove({mergedValues, spawnedPos});
  // Immediately clear mergedFromId so the NEXT move's animateMove never
  // sees stale references — moves can happen faster than the 130ms timeout
  ACTIVE_GAME.grid.forEach(row=>row.forEach(t=>{ if(t) delete t.mergedFromId; }));

  const modeDef=MODES.find(m=>m.id===ACTIVE_GAME.mode);
  if(!ACTIVE_GAME.hasWon && newMax===modeDef.unlockTile){
    setTimeout(()=>triggerWin(modeDef), 550);
  } else if(isGameOverBoard(afterBoard)){
    showStuckModal();
  }

  runAchievementChecks({event:'tile', tileValue:newMax});
  runAchievementChecks({event:'move'});

  STATE.savedGame=serializeActiveGame();
  persistNow();
  scheduleSave();
}

function doUndo(){
  if(!ACTIVE_GAME || !ACTIVE_GAME.prevSnapshot || ACTIVE_GAME.undosLeft<=0) return;
  ACTIVE_GAME.grid=ACTIVE_GAME.prevSnapshot.grid;
  ACTIVE_GAME.score=ACTIVE_GAME.prevSnapshot.score;
  ACTIVE_GAME.prevSnapshot=null;
  ACTIVE_GAME.undosLeft--;
  STATE.stats.undoUsage++;
  // Clear any stale mergedFromIds from the restored grid
  ACTIVE_GAME.grid.forEach(row=>row.forEach(t=>{ if(t) delete t.mergedFromId; }));
  playSound('click');
  queueToast('Undo used — score reverted');
  render(); // render() → afterGameRender() → renderBoardFull() — one clean pass
  STATE.savedGame=serializeActiveGame();
  persistNow();
  scheduleSave();
}
function doShuffle(){
  if(!ACTIVE_GAME || ACTIVE_GAME.shufflesLeft<=0) return;
  const flat=[];
  ACTIVE_GAME.grid.forEach(row=>row.forEach(t=>flat.push(t)));
  for(let i=flat.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [flat[i],flat[j]]=[flat[j],flat[i]]; }
  const size=MODES.find(m=>m.id===ACTIVE_GAME.mode).size;
  const newGrid=emptyGridTiles(size);
  let k=0;
  for(let r=0;r<size;r++) for(let c=0;c<size;c++) newGrid[r][c]=flat[k++];
  ACTIVE_GAME.grid=newGrid;
  ACTIVE_GAME.shufflesLeft--;
  STATE.stats.shuffleUsage++;
  playSound('click');
  queueToast('Board shuffled');
  render();
  STATE.savedGame=serializeActiveGame();
  scheduleSave();
}
function doHint(){
  if(!ACTIVE_GAME) return;
  let best=null, bestScore=-Infinity;
  ['up','down','left','right'].forEach(d=>{
    const {grid:ng, changed, scoreGained} = applyMoveWithTracking(ACTIVE_GAME.grid, d);
    if(!changed) return;
    const heur = countEmpty(gridToBoard(ng))*10 + scoreGained;
    if(heur>bestScore){ bestScore=heur; best=d; }
  });
  ACTIVE_GAME.hintsUsedThisGame++;
  STATE.stats.hintsUsed++;
  playSound('click');
  if(best) showHintArrow(best); else queueToast('No moves left!');
  scheduleSave();
}
function doRestart(){
  if(!ACTIVE_GAME) return;
  const mode=ACTIVE_GAME.mode;
  finalizeSession(ACTIVE_GAME.hasWon);
  startGame(mode);
}
function triggerWin(modeDef){
  if(!ACTIVE_GAME || ACTIVE_GAME.hasWon) return;
  ACTIVE_GAME.hasWon=true;
  playSound('victory');
  vibrateDevice('strong');
  confettiBurst();
  onGameWon();
  const nextMode=MODES.find(m=>m.requires===modeDef.id);
  let unlockMsg='';
  if(nextMode && !STATE.progress.unlockedModes.includes(nextMode.id)){
    STATE.progress.unlockedModes.push(nextMode.id);
    unlockMsg=nextMode.name+' Mode ('+nextMode.size+'×'+nextMode.size+') is now unlocked!';
  } else if(modeDef.id==='expert'){
    unlockMsg='Master Mode (10×10) is coming in a future update!';
  }
  const emptyCells=countEmpty(gridToBoard(ACTIVE_GAME.grid));
  runAchievementChecks({event:'win', emptyCells});
  checkThemeSkinUnlocks();
  STATE.savedGame=serializeActiveGame();
  scheduleSave();
  showModal({
    icon:'trophy', grad:'gold', title:'You Win!',
    body:'You reached '+modeDef.unlockTile+' in '+modeDef.name+' Mode.'+(unlockMsg?' '+unlockMsg:''),
    actions:[
      {label:'Keep Playing', kind:'primary', onClick:()=>{ closeModal(); }},
      {label:'Back to Modes', kind:'secondary', onClick:()=>{ closeModal(); finalizeSession(true); nav('modes'); }},
    ]
  });
}
function showStuckModal(){
  if(!ACTIVE_GAME) return;
  const actions = [];
  if(ACTIVE_GAME.undosLeft>0) actions.push({label:`↶ Undo (${ACTIVE_GAME.undosLeft} left)`, kind:'primary', onClick:()=>{ closeModal(); doUndo(); }});
  else actions.push({label:'+ Undo — Watch Ad', kind:'primary', onClick:()=>{ closeModal(); requestRewardedAd('undo'); }});
  
  if(ACTIVE_GAME.shufflesLeft>0) actions.push({label:`Shuffle (${ACTIVE_GAME.shufflesLeft} left)`, kind:'primary', onClick:()=>{ closeModal(); doShuffle(); }});
  else actions.push({label:'+ Shuffle — Watch Ad', kind:'primary', onClick:()=>{ closeModal(); requestRewardedAd('shuffle'); }});
  
  actions.push({label:'Give Up & End Game', kind:'danger', onClick:()=>{ closeModal(); triggerGameOver(); }});
  
  showModal({
    icon:'bulb', grad:'amber', title:'No Moves Left',
    body:'Your board is stuck. Use Undo or Shuffle to continue, or watch an ad for a free boost.',
    actions
  });
}

function triggerGameOver(){
  if(!ACTIVE_GAME || ACTIVE_GAME.isOver) return;
  ACTIVE_GAME.isOver=true;
  playSound('gameover');
  vibrateDevice('medium');
  finalizeSession(ACTIVE_GAME.hasWon);
  runAchievementChecks({event:'gameover'});
  STATE.savedGame=serializeActiveGame();
  scheduleSave();
  showModal({
    icon:'gameover', grad:'red', title:'Game Over',
    body:'Final score: '+ACTIVE_GAME.score.toLocaleString(),
    actions:[
      {label:'Try Again', kind:'primary', onClick:()=>{ const m=ACTIVE_GAME.mode; closeModal(); startGame(m); }},
      {label:'Back to Modes', kind:'secondary', onClick:()=>{ closeModal(); nav('modes'); }},
    ]
  });
}

// ============================== PROGRESSION ==============================
function buildCtx(overrides){
  return Object.assign({ stats:STATE.stats, profile:STATE.profile, progress:STATE.progress,
    streak:STATE.streak, achievements:STATE.achievements, game:ACTIVE_GAME, event:'generic' }, overrides);
}
function applyXP(amount){
  if(!amount) return false;
  STATE.profile.xp += amount;
  let leveled=false;
  while(STATE.profile.xp >= xpForLevel(STATE.profile.level)){
    STATE.profile.xp -= xpForLevel(STATE.profile.level);
    STATE.profile.level++;
    leveled=true;
  }
  STATE.profile.title = titleForLevel(STATE.profile.level);
  if(leveled) checkThemeSkinUnlocks();
  return leveled;
}
function runAchievementChecks(overrides){
  const ctx=buildCtx(overrides);
  let unlockedAny=false;
  ACHIEVEMENTS.forEach(a=>{
    if(STATE.achievements.unlocked[a.id]) return;
    let ok=false;
    try{ ok=!!a.check(ctx); }catch(e){ ok=false; }
    if(ok){
      STATE.achievements.unlocked[a.id]=Date.now();
      applyXP(a.xp);
      queueToast('Achievement Unlocked: '+a.name+' (+'+a.xp+' XP)');
      unlockedAny=true;
    }
  });
  if(unlockedAny){ checkThemeSkinUnlocks(); scheduleSave(); }
}
function checkThemeSkinUnlocks(){
  const ctx=buildCtx({});
  let any=false;
  THEMES.forEach(t=>{
    if(!STATE.progress.unlockedThemes.includes(t.id) && t.unlock(ctx)){
      STATE.progress.unlockedThemes.push(t.id); queueToast('New theme unlocked: '+t.name+'!'); any=true;
    }
  });
  SKINS.forEach(s=>{
    if(!STATE.progress.unlockedSkins.includes(s.id) && s.unlock(ctx)){
      STATE.progress.unlockedSkins.push(s.id); queueToast('New tile skin unlocked: '+s.name+'!'); any=true;
    }
  });
  if(any) scheduleSave();
}

// ---- Streaks ----
function updateStreak(){
  const today=dateKey(new Date());
  if(STATE.streak.lastPlayedDate===today) return;
  const yesterday=dateKey(new Date(Date.now()-86400000));
  if(STATE.streak.lastPlayedDate===yesterday) STATE.streak.current++;
  else STATE.streak.current=1;
  if(STATE.streak.current>STATE.streak.longest) STATE.streak.longest=STATE.streak.current;
  STATE.streak.lastPlayedDate=today;
  STATE.streak.history[today]=true;
  runAchievementChecks({event:'streak'});
  checkThemeSkinUnlocks();
}

// ---- Daily / Weekly challenges (deterministic offline generation) ----
function ensureChallenges(){
  const today=dateKey(new Date()), wk=isoWeekKey(new Date());
  const d=STATE.challenges.daily;
  if(d.date!==today){
    const idx=seededIndex(today, DAILY_TEMPLATES.length), tpl=DAILY_TEMPLATES[idx];
    STATE.challenges.daily={date:today, index:idx, type:tpl.type, target:tpl.target, label:tpl.label(tpl.target),
      progress:0, completed:false, todayMerges:0, todayGamesPlayed:0, todayGamesWon:0, todayMaxTile:0, todayMaxScore:0};
  }
  const w=STATE.challenges.weekly;
  if(w.weekKey!==wk){
    const idx=seededIndex(wk, WEEKLY_TEMPLATES.length), tpl=WEEKLY_TEMPLATES[idx];
    STATE.challenges.weekly={weekKey:wk, index:idx, type:tpl.type, target:tpl.target, label:tpl.label(tpl.target),
      progress:0, completed:false, weekMerges:0, weekGamesPlayed:0, weekMaxTile:0};
  }
}
function updateDailyChallengeForNewGame(){
  ensureChallenges();
  STATE.challenges.daily.todayGamesPlayed++;
  STATE.challenges.weekly.weekGamesPlayed++;
  evaluateChallengeProgress();
}
function updateChallengeProgress({merges,maxTile,score}){
  ensureChallenges();
  const d=STATE.challenges.daily, w=STATE.challenges.weekly;
  d.todayMerges+=merges; w.weekMerges+=merges;
  if(maxTile>d.todayMaxTile) d.todayMaxTile=maxTile;
  if(maxTile>w.weekMaxTile) w.weekMaxTile=maxTile;
  if(score>d.todayMaxScore) d.todayMaxScore=score;
  evaluateChallengeProgress();
}
function onGameWon(){
  ensureChallenges();
  STATE.challenges.daily.todayGamesWon=(STATE.challenges.daily.todayGamesWon||0)+1;
  evaluateChallengeProgress();
}
function challengeProgressValue(c, prefix){
  switch(c.type){
    case 'merges': return c[prefix+'Merges'];
    case 'reachTile': return c[prefix+'MaxTile'];
    case 'playGames': return c[prefix+'GamesPlayed'];
    case 'winGame': return c[prefix+'GamesWon'];
    case 'scoreOne': return c[prefix+'MaxScore'];
    default: return 0;
  }
}
function evaluateChallengeProgress(){
  const d=STATE.challenges.daily;
  d.progress=Math.min(d.target, challengeProgressValue(d,'today'));
  if(!d.completed && d.progress>=d.target){ d.completed=true; applyXP(120); queueToast('Daily Challenge complete! +120 XP'); }
  const w=STATE.challenges.weekly;
  w.progress=Math.min(w.target, challengeProgressValue(w,'week'));
  if(!w.completed && w.progress>=w.target){ w.completed=true; applyXP(300); queueToast('Weekly Mission complete! +300 XP'); }
}

// ---- Board tile rendering / animation ----
let _lastBoardWidth=320;
function getBoardMetrics(size){
  const layer=document.getElementById('tile-layer');
  let w = layer ? layer.clientWidth : _lastBoardWidth;
  if(w <= 0) w = _lastBoardWidth; // guard against 0 during reflow/rapid moves
  if(w > 0) _lastBoardWidth = w;  // cache last valid value
  const gap=8;
  return {cellSize:(w-gap*(size-1))/size, gap};
}
function positionTile(el,r,c,metrics){
  const {cellSize,gap}=metrics;
  el.style.width=cellSize+'px'; el.style.height=cellSize+'px';
  el.style.left=(c*(cellSize+gap))+'px'; el.style.top=(r*(cellSize+gap))+'px';
}
function paintTile(el,value){
  const skin=SKINS.find(s=>s.id===STATE.progress.selectedSkin)||SKINS[0];
  const {bg,fg}=tileColor(skin,value);
  el.style.background=bg; el.style.color=fg;
  const digits=String(value).length;
  const cellSize=parseFloat(el.style.width)||60;
  el.style.fontSize=(cellSize*(digits<=2?0.44:digits===3?0.36:digits===4?0.3:0.24))+'px';
  el.textContent=value;
}
function tileElFor(tile,r,c,metrics){
  const el=document.createElement('div');
  el.className='tile tile-new';
  el.dataset.id=tile.id;
  positionTile(el,r,c,metrics);
  paintTile(el,tile.value);
  return el;
}
function renderBoardFull(){
  if(!ACTIVE_GAME) return;
  const mode=MODES.find(m=>m.id===ACTIVE_GAME.mode);
  const layer=document.getElementById('tile-layer');
  if(!layer) return;
  layer.innerHTML='';
  const metrics=getBoardMetrics(mode.size);
  ACTIVE_GAME.grid.forEach((row,r)=>row.forEach((t,c)=>{ if(t) layer.appendChild(tileElFor(t,r,c,metrics,mode.size)); }));
}
function animateMove({mergedValues, spawnedPos}){
  const mode=MODES.find(m=>m.id===ACTIVE_GAME.mode);
  const layer=document.getElementById('tile-layer');
  if(!layer){ return; }
  const metrics=getBoardMetrics(mode.size);

  // Build the set of IDs that should exist in the DOM for this animation:
  // live tiles + consumed tiles (which slide to their merge target before being removed)
  const liveIds=new Set();
  ACTIVE_GAME.grid.forEach(row=>row.forEach((t,c)=>{ if(t){ liveIds.add(t.id); if(t.mergedFromId) liveIds.add(t.mergedFromId); } }));
  // Upfront sweep: remove any DOM tiles that are not live AND not consumed by this move.
  // This clears ghost tiles left over from previous rapid-move cycles.
  layer.querySelectorAll('.tile').forEach(el=>{ if(!liveIds.has(el.dataset.id)) el.remove(); });

  const existing={};
  layer.querySelectorAll('.tile').forEach(el=>{ existing[el.dataset.id]=el; });

  const destById={};
  ACTIVE_GAME.grid.forEach((row,r)=>row.forEach((t,c)=>{ if(t) destById[t.id]={r,c,value:t.value,mergedFromId:t.mergedFromId}; }));

  Object.keys(destById).forEach(id=>{
    const info=destById[id];
    const el=existing[id];
    if(el) positionTile(el, info.r, info.c, metrics);
    if(info.mergedFromId && existing[info.mergedFromId]) positionTile(existing[info.mergedFromId], info.r, info.c, metrics);
  });

  const mult=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--anim-mult'))||1;
  const dur=130*mult;
  setTimeout(()=>{
    // Re-query layer — doUndo/doShuffle may have replaced it during the timeout
    const freshLayer=document.getElementById('tile-layer');
    if(!freshLayer) return;

    let hadBigExplosion=false;
    Object.keys(destById).forEach(id=>{
      const info=destById[id];
      if(info.mergedFromId){
        const consumed=existing[info.mergedFromId];
        if(consumed) consumed.remove();
        const survivor=existing[id];
        if(survivor){
          paintTile(survivor, info.value);
          survivor.classList.remove('tile-merged'); void survivor.offsetWidth; survivor.classList.add('tile-merged');
          const tier=explosionForValue(info.value);
          if(tier){ hadBigExplosion=true; triggerExplosionAt(survivor, tier, info.value); }
        }
      }
    });

    // Bug 2 fix: clear mergedFromId from every tile in the live grid so stale
    // references never cause the next animateMove to wrongly target new tiles.
    if(ACTIVE_GAME) ACTIVE_GAME.grid.forEach(row=>row.forEach(t=>{ if(t) delete t.mergedFromId; }));

    if(spawnedPos){
      const el=tileElFor({id:spawnedPos.id,value:spawnedPos.value}, spawnedPos.r, spawnedPos.c, metrics);
      freshLayer.appendChild(el);
    }
    if(!hadBigExplosion && mergedValues.length>0 && Math.random()<0.15) triggerCheer();
    else if(mergedValues.length===0 && Math.random()<0.05) triggerCheer();

    // Ghost sweep: remove any DOM tile whose ID is no longer in the live grid.
    // This catches tiles spawned async by an earlier move that were already merged
    // by a subsequent rapid move before the spawn DOM insertion happened.
    if(ACTIVE_GAME){
      const live=new Set();
      ACTIVE_GAME.grid.forEach(row=>row.forEach(t=>{ if(t) live.add(t.id); }));
      freshLayer.querySelectorAll('.tile').forEach(el=>{
        if(!live.has(el.dataset.id)) el.remove();
      });
    }

    updateHudNumbers();
  }, dur+10);
}
function updateHudNumbers(){
  const scoreEl=document.getElementById('hud-score'), bestEl=document.getElementById('hud-best'), levelEl=document.getElementById('hud-level'), xpFill=document.getElementById('hud-xp-fill');
  if(!ACTIVE_GAME) return;

}

function toggleSetting(path, el){
  const newVal = !getByPath(STATE.settings, path);
  setByPath(STATE.settings, path, newVal);
  if(el){ el.classList.toggle('on', newVal); }
  scheduleSave();
  if(path==='display.mode'){ applyThemeToDOM(); }
}
function setSetting(path,val){
  setByPath(STATE.settings, path, val);
  scheduleSave();
  if(path==='sound.volume') return;
  if(path==='display.mode'){ applyThemeToDOM(); render(); return; }
  if(path==='display.animSpeed'){ applyAnimSpeed(); }
  // Update matching seg-control buttons in place — no screen flash
  const group = path==='haptics.intensity' ? 'haptics-intensity' : null;
  if(group){
    document.querySelectorAll(`.seg-btn[data-group="${group}"]`).forEach(b=>{
      b.classList.toggle('active', b.getAttribute('data-val')===String(val));
    });
  }
}
function setDisplayMode(mode){
  STATE.settings.display.mode=mode;
  if(mode==='dark') STATE.progress.selectedTheme='dark';
  else if(mode==='light') STATE.progress.selectedTheme='light';
  else STATE.progress.selectedTheme = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark':'light';
  applyThemeToDOM();
  scheduleSave();
  // Only update the seg buttons in place — no blink
  document.querySelectorAll('.seg-btn[data-group="display-mode"]').forEach(b=>{
    b.classList.toggle('active', b.getAttribute('data-val')===mode);
  });
}
function applyThemeToDOM(){ document.body.setAttribute('data-theme', STATE.progress.selectedTheme); }
function setAnimSpeed(v){
  STATE.settings.display.animSpeed=v;
  applyAnimSpeed();
  scheduleSave();
  // Update seg buttons in place
  document.querySelectorAll('.seg-btn[data-group="anim-speed"]').forEach(b=>{
    b.classList.toggle('active', b.getAttribute('data-val')===v);
  });
}
function applyAnimSpeed(){
  const mult = STATE.settings.display.animSpeed==='slow'?1.6 : STATE.settings.display.animSpeed==='fast'?0.55 : 1;
  document.documentElement.style.setProperty('--anim-mult', mult);
}
function toggleRow(label,path,value){ return `<div class="toggle-row"><span class="lbl">${label}</span><div class="switch ${value?'on':''}" onclick="toggleSetting('${path}',this)"><div class="knob"></div></div></div>`; }
let versionTapCount=0, versionTapTimer=null;
let testerTapCount=0, testerTapTimer=null;
let TESTER_MODE_ACTIVE=false;
function tapVersion(){
  versionTapCount++;
  clearTimeout(versionTapTimer);
  versionTapTimer=setTimeout(()=>{ versionTapCount=0; }, 1500);
  if(versionTapCount>=7){
    versionTapCount=0;
    STATE.progress.debugUnlocked=true;
    queueToast('Debug panel unlocked');
    scheduleSave(); render();
  }
}

function tapTesterBadge(){
  testerTapCount++;
  clearTimeout(testerTapTimer);
  testerTapTimer=setTimeout(()=>{ testerTapCount=0; }, 1200);
  if(testerTapCount>=3){
    testerTapCount=0;
    TESTER_MODE_ACTIVE=!TESTER_MODE_ACTIVE;
    if(TESTER_MODE_ACTIVE){
      queueToast('Tester Mode ON — all modes accessible');
      playSound('victory');
    } else {
      queueToast('Tester Mode OFF');
      playSound('click');
    }
    render();
  }
}

function isModeUnlockedForPlay(id){
  if(TESTER_MODE_ACTIVE) return true;
  return isModeUnlocked(id);
}

  overlay.className='modal-overlay'; overlay.id='active-modal';

function closeModal(){ const m=document.getElementById('active-modal'); if(m) m.remove(); }

let toastQueue=[], toastShowing=false;
function queueToast(msg){ toastQueue.push(msg); processToastQueue(); }
function processToastQueue(){
  if(toastShowing || !toastQueue.length) return;
  toastShowing=true;
  const msg=toastQueue.shift();
  const layer=document.getElementById('toast-layer');
  if(!layer){ toastShowing=false; return; }
  const el=document.createElement('div');
  el.className='toast'; el.textContent=msg;
  layer.appendChild(el);
  const mult=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--anim-mult'))||1;
  setTimeout(()=>{ el.remove(); toastShowing=false; processToastQueue(); }, 3000*mult);
}

function showBoardMessage(text, isCheer, tier){
  const layer=document.getElementById('board-msg-layer');
  if(!layer) return;
  // Only one message at a time — clear any existing
  while(layer.firstChild) layer.firstChild.remove();
  const el=document.createElement('div');
  const isHigh = !isCheer && tier>=6;
  el.className='merge-msg'+(isCheer?' cheer-msg':'')+(isHigh?' tier-high':'');
  el.textContent=text;
  layer.appendChild(el);
  const duration = isCheer ? 1200 : isHigh ? 1500 : 1300;
  setTimeout(()=>{ if(el.parentNode) el.remove(); }, Math.round(duration * (parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--anim-mult'))||1)));
}
function screenShake(){
  const b=document.getElementById('game-board');
  if(!b) return;
  b.classList.remove('shake'); void b.offsetWidth; b.classList.add('shake');
}
function burstParticlesFromEl(el, tier){
  const layer=document.getElementById('fx-layer');
  if(!layer||!el) return;
  const rect=el.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  const colors= tier>=6? ['#ffd23f','#ffb347','#fff566','#e8a33d'] : tier>=4? ['#ff8a3d','#ffd23f','#ff5e3b'] : ['#f0c274','#e8a33d','#fff'];
  const count=Math.min(50, 10+tier*5);
  for(let i=0;i<count;i++){
    const p=document.createElement('div');
    p.className='particle';
    const angle=Math.random()*Math.PI*2, dist=30+Math.random()*(40+tier*8), size=4+Math.random()*6;
    p.style.left=cx+'px'; p.style.top=cy+'px'; p.style.width=size+'px'; p.style.height=size+'px';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.setProperty('--dx',(Math.cos(angle)*dist)+'px');
    p.style.setProperty('--dy',(Math.sin(angle)*dist)+'px');
    p.style.animationDuration=(500+tier*40)+'ms';
    layer.appendChild(p);
    setTimeout(()=>p.remove(), 700+tier*40);
  }
}
function confettiBurst(count){
  count=count||60;
  const layer=document.getElementById('fx-layer');
  if(!layer) return;
  const colors=['#e8a33d','#5fb8b0','#e35d5d','#f0c274','#8fbc5a','#2dd4bf'];
  for(let i=0;i<count;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=(Math.random()*100)+'vw';
    c.style.width=(6+Math.random()*6)+'px'; c.style.height=(10+Math.random()*8)+'px';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration=(2200+Math.random()*1400)+'ms';
    c.style.animationDelay=(Math.random()*300)+'ms';
    layer.appendChild(c);
    setTimeout(()=>c.remove(), 4200);
  }
}

// ---- Synthesized audio (Web Audio API — no external sound files, fully offline) ----
let audioCtx=null;
function getAudioCtx(){
  if(!audioCtx){ try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ audioCtx=null; } }
  return audioCtx;
}
function playSound(name){
  const s=STATE.settings.sound;
  if(!s.master) return;
  const map={swipe:'swipe', merge:'merge', explosion:'explosion', victory:'victory', gameover:'gameOver', click:'buttonClick'};
  const key=map[name];
  if(key && s[key]===false) return;
  const ctx=getAudioCtx();
  if(!ctx) return;
  const vol=s.volume, now=ctx.currentTime;
  function tone(freq,start,dur,type,gain){
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type=type||'sine'; o.frequency.setValueAtTime(freq, now+start);
    g.gain.setValueAtTime(0, now+start);
    g.gain.linearRampToValueAtTime(gain*vol, now+start+0.01);
    g.gain.exponentialRampToValueAtTime(0.001, now+start+dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(now+start); o.stop(now+start+dur+0.02);
  }
  if(name==='swipe') tone(220,0,0.05,'sine',0.15);
  else if(name==='merge'){ tone(440,0,0.08,'triangle',0.25); tone(660,0.04,0.08,'triangle',0.18); }
  else if(name==='explosion'){ tone(300,0,0.1,'sawtooth',0.2); tone(500,0.06,0.12,'triangle',0.2); tone(760,0.12,0.14,'triangle',0.18); }
  else if(name==='victory'){ [523,659,784,1046].forEach((f,i)=>tone(f,i*0.11,0.22,'triangle',0.22)); }
  else if(name==='gameover'){ [392,330,262].forEach((f,i)=>tone(f,i*0.14,0.28,'sine',0.2)); }
  else if(name==='click') tone(880,0,0.04,'square',0.08);
  // --- Cheer sounds (each has its own funny personality) ---
  else if(name==='cheer_boing'){
    // Cartoon spring boing — pitch sweeps up then down
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(180,now); o.frequency.exponentialRampToValueAtTime(900,now+0.12); o.frequency.exponentialRampToValueAtTime(260,now+0.28);
    g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(0.28*vol,now+0.02); g.gain.exponentialRampToValueAtTime(0.001,now+0.35);
    o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now+0.38);
  }
  else if(name==='cheer_whistle'){
    // Happy slide whistle — sweeps up
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(600,now); o.frequency.exponentialRampToValueAtTime(1400,now+0.18);
    g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(0.22*vol,now+0.02); g.gain.exponentialRampToValueAtTime(0.001,now+0.25);
    o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now+0.28);
  }
  else if(name==='cheer_zing'){
    // Electric zing — high metallic burst
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type='sawtooth';
    o.frequency.setValueAtTime(1800,now); o.frequency.exponentialRampToValueAtTime(400,now+0.15);
    g.gain.setValueAtTime(0.2*vol,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.18);
    o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now+0.2);
  }
  else if(name==='cheer_sizzle'){
    // Sizzle — filtered noise burst
    const buf=ctx.createBuffer(1,ctx.sampleRate*0.2,ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.5;
    const src=ctx.createBufferSource(), flt=ctx.createBiquadFilter(), g=ctx.createGain();
    flt.type='bandpass'; flt.frequency.value=2200; flt.Q.value=0.8;
    g.gain.setValueAtTime(0.3*vol,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.2);
    src.buffer=buf; src.connect(flt); flt.connect(g); g.connect(ctx.destination); src.start(now); src.stop(now+0.22);
  }
  else if(name==='cheer_bloop'){
    // Soft bloop — bubble pop feel
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(320,now); o.frequency.exponentialRampToValueAtTime(80,now+0.14);
    g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(0.3*vol,now+0.015); g.gain.exponentialRampToValueAtTime(0.001,now+0.18);
    o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now+0.2);
  }
  else if(name==='cheer_pop'){
    // Clean pop — short crisp click-pop
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type='triangle';
    o.frequency.setValueAtTime(700,now); o.frequency.exponentialRampToValueAtTime(200,now+0.07);
    g.gain.setValueAtTime(0.32*vol,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.09);
    o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now+0.1);
  }
  else if(name==='cheer_ping'){
    // Bright ping — clear bell tone
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(1260,now);
    g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(0.22*vol,now+0.008); g.gain.exponentialRampToValueAtTime(0.001,now+0.4);
    o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now+0.42);
  }
}
function vibrateDevice(intensity){
  if(!STATE.settings.haptics.enabled) return;
  if(!navigator.vibrate) return;
  const want=intensity||STATE.settings.haptics.intensity;
  const ms= want==='light'?10 : want==='strong'?50 : 25;
  try{ navigator.vibrate(ms); }catch(e){}
}

// ============================== ADS (AdMob — banner + rewarded via Ad Placement API) ==============================
function initAds(){
  if(!adsConfigured()) return;
  try{
    // Load AdMob / AdSense script
    const s=document.createElement('script');
    s.async=true;
    s.setAttribute('data-ad-frequency-hint', AD_CONFIG.rewardedAdFrequencyHint);
    s.src='https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client='+AD_CONFIG.adsensePublisherId;
    s.crossOrigin='anonymous';
    document.head.appendChild(s);
    window.adsbygoogle=window.adsbygoogle||[];
    // Google H5 Games Ad Placement API — used for rewarded ads
    window.adBreak=window.adConfig=function(o){ window.adsbygoogle.push(o); };
    // Tell the API which app this is
    window.adConfig({ preloadAdBreaks:'on', sound:'on' });
  }catch(e){ console.error('AdMob init failed', e); }
}

const AdService={
  showRewarded(rewardName, onReward){
    if(adsConfigured() && window.adBreak){
      window.adBreak({
        type:'reward',
        name:rewardName,
        adUnitId: AD_CONFIG.rewardedUnitId,   // real AdMob rewarded unit ID
        beforeReward:(showAdFn)=>{ showAdFn(); },
        adViewed:()=>{ onReward(); scheduleSave(); },
        adDismissed:()=>{ queueToast('Ad closed early — no reward given'); },
        adBreakDone:(info)=>{
          // info.breakStatus tells you why the ad didn't show if it failed
          if(info && info.breakStatus && info.breakStatus!=='viewed' && info.breakStatus!=='dismissed'){
            console.warn('Ad break status:', info.breakStatus);
          }
        },
      });
    } else {
      // Fallback: simulated ad for testing (fires when AdMob SDK isn't loaded yet)
      simulateRewardedAd(()=>{ onReward(); scheduleSave(); });
    }
  }
};

  const old=document.getElementById('active-modal'); if(old) old.remove();
  const overlay=document.createElement('div');
  overlay.className='modal-overlay'; overlay.id='active-modal';
  overlay.innerHTML=`<div class="modal-card">

  </div>`;

  requestAnimationFrame(()=>{ const bar=document.getElementById('ad-sim-progress'); if(bar) bar.style.width='100%'; });

}

function requestRewardedAd(kind){
  const rewardName= kind==='undo' ? 'bonus_undos' : 'bonus_shuffles';
  AdService.showRewarded(rewardName, ()=>{
    if(!ACTIVE_GAME) return;
    if(kind==='undo'){ ACTIVE_GAME.undosLeft+=2; queueToast('+2 Undos earned!'); }
    else { ACTIVE_GAME.shufflesLeft+=2; queueToast('+2 Shuffles earned!'); }
    STATE.savedGame=serializeActiveGame();
    scheduleSave();
    render();
  });
}

function openAdChooser(){
  if(!ACTIVE_GAME) return;
  showModal({
    icon:'film', grad:'pink', title:'Get More',
    body:'Watch a short ad to earn a bonus for this game.',
    actions:[
      {label:'+2 Undos — Watch Ad', kind:'primary', onClick:()=>{ closeModal(); requestRewardedAd('undo'); }},
      {label:'+2 Shuffles — Watch Ad', kind:'primary', onClick:()=>{ closeModal(); requestRewardedAd('shuffle'); }},
      {label:'Not Now', kind:'secondary', onClick:closeModal},
    ]
  });
}

function renderBannerSlot(slotKey){
  if(bannerConfigured(slotKey)){
    return `<div class="banner-ad-wrap">
      <ins class="adsbygoogle"
        style="display:block"
        data-ad-client="${AD_CONFIG.adsensePublisherId}"
        data-ad-slot="${AD_CONFIG.bannerSlots[slotKey]}"
        data-ad-format="auto"
        data-full-width-responsive="true"></ins>
    </div>`;
  }
  // Show nothing when not configured — no placeholder clutter for real users
  return '';
}
function activateBannerSlots(){
  if(!adsConfigured()) return;
  document.querySelectorAll('ins.adsbygoogle:not([data-ad-status])').forEach(()=>{
    try{ (window.adsbygoogle=window.adsbygoogle||[]).push({}); }catch(e){}
  });
}

// ============================== INIT ==============================
document.addEventListener('keydown', e=>{
  const map={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',s:'down',a:'left',d:'right',W:'up',S:'down',A:'left',D:'right'};
  if(map[e.key] && CURRENT_SCREEN==='game' && !document.getElementById('active-modal')){
    e.preventDefault(); doMove(map[e.key]);
  }
});

let touchStartX=0, touchStartY=0, touchActive=false;
function attachSwipeHandlers(){
  const board=document.getElementById('game-board');
  if(!board || board._swipeAttached) return;
  board._swipeAttached=true;
  board.addEventListener('touchstart', e=>{
    if(e.touches.length!==1) return;
    touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; touchActive=true;
  }, {passive:true});
  board.addEventListener('touchmove', e=>{ if(touchActive) e.preventDefault(); }, {passive:false});
  board.addEventListener('touchend', e=>{
    if(!touchActive) return;
    touchActive=false;
    if(document.getElementById('active-modal')) return;
    const dx=e.changedTouches[0].clientX-touchStartX, dy=e.changedTouches[0].clientY-touchStartY;
    const absX=Math.abs(dx), absY=Math.abs(dy);
    if(Math.max(absX,absY) < 22) return;
    if(absX>absY) doMove(dx>0?'right':'left'); else doMove(dy>0?'down':'up');
  }, {passive:true});
}

async function boot(){
  STATE = await loadState();
  ensureChallenges();
  applyAnimSpeed();
  if(STATE.settings.display.mode==='auto'){
    STATE.progress.selectedTheme = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
  }
  applyThemeToDOM();
  initAds();
  CURRENT_SCREEN='splash';
  render();
  setTimeout(()=>{ nav('home'); }, 2200);
  startTicking();
  document.addEventListener('touchmove', e=>{ if(e.scale && e.scale!==1) e.preventDefault(); }, {passive:false});
}
window.addEventListener('DOMContentLoaded', boot);
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='hidden' && STATE) persistNow(); });
window.addEventListener('pagehide', ()=>{ if(STATE) persistNow(); });
window.addEventListener('blur', ()=>{ if(STATE) persistNow(); });
</script>
</body>
